<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 130" fill="none">
  <!-- Table legs -->
  <rect x="14" y="72" width="10" height="54" rx="4" fill="#7A5230"/>
  <rect x="156" y="72" width="10" height="54" rx="4" fill="#7A5230"/>
  <rect x="24" y="76" width="8" height="46" rx="3" fill="#5C3D1E"/>
  <rect x="148" y="76" width="8" height="46" rx="3" fill="#5C3D1E"/>
  <!-- Cross support -->
  <rect x="28" y="106" width="124" height="8" rx="4" fill="#6B4826"/>
  <!-- Table apron front -->
  <rect x="10" y="58" width="160" height="16" rx="4" fill="#8B6340"/>
  <!-- Tabletop underside edge -->
  <rect x="6" y="44" width="168" height="18" rx="5" fill="#9B7350"/>
  <!-- Tabletop surface -->
  <rect x="4" y="14" width="172" height="34" rx="6" fill="#C8A068"/>
  <!-- Wood grain lines -->
  <line x1="30" y1="18" x2="30" y2="44" stroke="#B08850" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="18" x2="60" y2="44" stroke="#B08850" stroke-width="1" opacity="0.5"/>
  <line x1="90" y1="18" x2="90" y2="44" stroke="#B08850" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="18" x2="120" y2="44" stroke="#B08850" stroke-width="1" opacity="0.5"/>
  <line x1="150" y1="18" x2="150" y2="44" stroke="#B08850" stroke-width="1" opacity="0.5"/>
  <!-- Top edge highlight -->
  <rect x="4" y="14" width="172" height="4" rx="3" fill="#DEB878" opacity="0.6"/>
<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-size="20" fill="green">RIGHT</text></svg>
