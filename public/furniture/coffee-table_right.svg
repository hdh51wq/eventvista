<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none">
  <!-- Legs -->
  <rect x="10" y="62" width="8" height="34" rx="3" fill="#5C3D1E"/>
  <rect x="142" y="62" width="8" height="34" rx="3" fill="#5C3D1E"/>
  <rect x="30" y="66" width="8" height="30" rx="3" fill="#7A5230"/>
  <rect x="122" y="66" width="8" height="30" rx="3" fill="#7A5230"/>
  <!-- Apron -->
  <rect x="14" y="50" width="132" height="14" rx="4" fill="#9B7350"/>
  <!-- Tabletop edge -->
  <rect x="8" y="36" width="144" height="16" rx="5" fill="#A07848"/>
  <!-- Tabletop surface -->
  <rect x="6" y="10" width="148" height="28" rx="5" fill="#C8A068"/>
  <!-- Glass inset -->
  <rect x="18" y="14" width="124" height="20" rx="4" fill="#D8EEF8" opacity="0.55"/>
  <!-- Glass reflection -->
  <rect x="22" y="15" width="40" height="4" rx="2" fill="white" opacity="0.4"/>
  <!-- Top highlight -->
  <rect x="6" y="10" width="148" height="5" rx="3" fill="#DEB878" opacity="0.5"/>
  <!-- Wood grain -->
  <line x1="40" y1="13" x2="40" y2="36" stroke="#B08850" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="13" x2="80" y2="36" stroke="#B08850" stroke-width="1" opacity="0.4"/>
  <line x1="120" y1="13" x2="120" y2="36" stroke="#B08850" stroke-width="1" opacity="0.4"/>
<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-size="20" fill="green">RIGHT</text></svg>
