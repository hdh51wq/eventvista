<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 160" fill="none">
  <!-- Pot -->
  <path d="M28 120 L18 160 L82 160 L72 120 Z" fill="#C1440E"/>
  <path d="M28 120 L18 160 L82 160 L72 120 Z" fill="url(#potgrad)"/>
  <defs>
    <linearGradient id="potgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A03800"/>
      <stop offset="40%" stop-color="#D4560E"/>
      <stop offset="100%" stop-color="#A03800"/>
    </linearGradient>
  </defs>
  <!-- Pot rim -->
  <rect x="24" y="114" width="52" height="10" rx="5" fill="#B84010"/>
  <!-- Soil -->
  <ellipse cx="50" cy="118" rx="26" ry="8" fill="#5C3D1E"/>
  <!-- Stem -->
  <path d="M50 118 Q52 90 48 70 Q46 50 50 30" stroke="#3A7A20" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Leaves left -->
  <ellipse cx="30" cy="70" rx="20" ry="10" fill="#4A9A28" transform="rotate(-30 30 70)"/>
  <ellipse cx="22" cy="50" rx="16" ry="8" fill="#5CB030" transform="rotate(-50 22 50)"/>
  <!-- Leaves right -->
  <ellipse cx="68" cy="64" rx="20" ry="10" fill="#4A9A28" transform="rotate(30 68 64)"/>
  <ellipse cx="74" cy="44" rx="16" ry="8" fill="#5CB030" transform="rotate(50 74 44)"/>
  <!-- Top leaf -->
  <ellipse cx="50" cy="24" rx="14" ry="8" fill="#62C034" transform="rotate(-10 50 24)"/>
  <!-- Leaf veins -->
  <line x1="30" y1="70" x2="48" y2="72" stroke="#3A7A20" stroke-width="1" opacity="0.5"/>
  <line x1="68" y1="64" x2="52" y2="66" stroke="#3A7A20" stroke-width="1" opacity="0.5"/>
</svg>
